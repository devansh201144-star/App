name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix and Install System Dependencies
        run: |
          sudo apt-get update
          # This command helps clear any pre-existing "held" package issues
          sudo apt-get install -fy
          
          # Consolidated install with conflict resolution flags
          sudo apt-get install -y --allow-downgrades --allow-remove-essential --allow-change-held-packages \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            automake m4 gettext autoconf-archive build-essential libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev openssl libgdbm-dev libgdbm-compat-dev \
            liblzma-dev libreadline-dev uuid-dev ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev

      - name: Install Python Build Tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # Accept licenses and build
          yes | buildozer -v android debug

      - name: Upload Artifact
          uses: actions/upload-artifact@v4
          with:
            name: python-apk
            path: bin/*.apk      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.33 virtualenv

      - name: Build APK with Buildozer
        run: |
          # Adding local bin to path
          export PATH=$PATH:~/.local/bin
          # Automatically accept SDK licenses and build
          yes | buildozer -v android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-android-package
          path: bin/*.apk
