name: Build Android APK
on: [push, pull_request]

env:
  # This resolves the Node.js 20 warning you saw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android & Build Dependencies
        run: |
          sudo apt update
          # Added openjdk-17 and shared-mime-info (crucial for Buildozer)
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential patch python3-dev openjdk-17-jdk shared-mime-info
          
          pip install --user --upgrade buildozer cython==0.29.33 virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # Creating a placeholder for the global config to avoid permission errors
          mkdir -p ~/.buildozer
          # The 'yes |' is mandatory to accept Android SDK licenses
          yes | buildozer -v android debug
        env:
          # This helps Buildozer find the right paths in CI
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-apk
          path: bin/*.apk
